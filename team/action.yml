name: Team
description: Run N agents on the same task, evaluate alignment of their outputs.

inputs:
  namespace:
    description: Shared module namespace for input/output
    required: true
  agents:
    description: "JSON array of agent configs, e.g. [{\"agent\":\"gemini\",\"model\":\"gemini-2.5-pro\"},{\"agent\":\"claude\"}]"
    required: true
  prompt:
    description: Path to prompt template (.mustache/.md/.txt) or prompt text
    required: true
  schema:
    description: Path to JSON Schema file for output validation
    required: false
  format:
    description: "Output format hint for serde parsing (json, yaml, toml, or omit to sniff)"
    required: false
  gemini-api-key:
    description: Gemini API key (required if any team member is gemini)
    required: false
  anthropic-api-key:
    description: Anthropic API key (required if any team member is claude)
    required: false
  org:
    description: GitHub org for membership verification (skip if empty)
    required: false
  actor:
    description: Actor login to verify (defaults to github.actor)
    required: false
  validator:
    description: "Path to validation script (.ts). Runs per-agent after parse."
    required: false
  on-retry:
    description: "Path to retry hook script (.ts). Called before each retry."
    required: false
  budget-queries:
    description: "JSON object mapping query names to JSONata expressions"
    required: false
  budget-overflow:
    description: "Path to overflow handler script (.ts). Required when budget-queries is set."
    required: false
  budget:
    description: "Budget cap (pre-computed by panel). Takes precedence over round."
    required: false
  round:
    description: "Current review round (1-based). Used to compute budget if this is the highest layer."
    required: false
    default: "1"
  debug:
    description: "Tee agent stdout/stderr to console"
    required: false
    default: "false"
  readonly:
    description: "Restrict all agents to read-only filesystem access."
    required: false
    default: "false"
  evaluator:
    description: Path to alignment evaluator script (.ts). Receives parsed outputs array, returns alignment report.
    required: true
  retries:
    description: Max retries per agent on structural failure
    required: false
    default: "3"
  timeout:
    description: Agent timeout in seconds
    required: false
    default: "900"

outputs:
  alignment:
    description: JSON alignment report from the evaluator
    value: ${{ steps.evaluate.outputs.alignment }}

runs:
  using: composite
  steps:
    - uses: sw2m/octoscript/action@main

    - name: Verify org membership
      if: ${{ inputs.org != '' }}
      uses: sw2m/octoscript/org@main
      with:
        org: ${{ inputs.org }}
        actor: ${{ inputs.actor || github.actor }}


    - id: evaluate
      shell: octoscript {0}
      env:
        INPUT_NAMESPACE: ${{ env.INPUT_NAMESPACE || inputs.namespace }}
        INPUT_AGENTS: ${{ env.INPUT_AGENTS || inputs.agents }}
        INPUT_PROMPT: ${{ env.INPUT_PROMPT || inputs.prompt }}
        INPUT_SCHEMA: ${{ env.INPUT_SCHEMA || inputs.schema }}
        INPUT_EVALUATOR: ${{ env.INPUT_EVALUATOR || inputs.evaluator }}
        INPUT_RETRIES: ${{ env.INPUT_RETRIES || inputs.retries }}
        INPUT_FORMAT: ${{ env.INPUT_FORMAT || inputs.format }}
        INPUT_VALIDATOR: ${{ env.INPUT_VALIDATOR || inputs.validator }}
        INPUT_ON_RETRY: ${{ env.INPUT_ON_RETRY || inputs.on-retry }}
        INPUT_TIMEOUT: ${{ env.INPUT_TIMEOUT || inputs.timeout }}
        INPUT_DEBUG: ${{ env.INPUT_DEBUG || inputs.debug }}
        INPUT_ROUND: ${{ env.INPUT_ROUND || inputs.round }}
        INPUT_GEMINI_API_KEY: ${{ env.INPUT_GEMINI_API_KEY || inputs.gemini-api-key }}
        INPUT_BUDGET_QUERIES: ${{ env.INPUT_BUDGET_QUERIES || inputs.budget-queries }}
        INPUT_BUDGET_OVERFLOW: ${{ env.INPUT_BUDGET_OVERFLOW || inputs.budget-overflow }}
        INPUT_BUDGET: ${{ env.INPUT_BUDGET || inputs.budget }}
        INPUT_ANTHROPIC_API_KEY: ${{ env.INPUT_ANTHROPIC_API_KEY || inputs.anthropic-api-key }}
      run: |
        const { Claude } = await import("https://raw.githubusercontent.com/sw2m/ci-agents/main/lib/claude.ts?t=" + Date.now());
        const { Gemini } = await import("https://raw.githubusercontent.com/sw2m/ci-agents/main/lib/gemini.ts?t=" + Date.now());
        const { validate } = await import("https://raw.githubusercontent.com/sw2m/ci-agents/main/lib/validate.ts?t=" + Date.now());

        const ns = inputs.get("namespace");
        const agentsRaw = inputs.get("agents") || "[]";
        const agents = serde.parse(agentsRaw);
        const promptInput = inputs.get("prompt");
        const schemaPath = inputs.get("schema");
        const evaluatorPath = inputs.get("evaluator");
        const maxRetries = parseInt(inputs.get("retries") || "3", 10);
        const timeout = parseInt(inputs.get("timeout") || "900", 10);

        // Build prompt
        const promptSrc = promptInput || await shared.get(ns, "prompt") || "";
        let tpl = promptSrc;
        if (/\.(mustache|md|txt)$/.test(promptSrc)) {
          tpl = await Deno.readTextFile(promptSrc);
        }
        const hasVars = Mustache.parse(tpl).some((t) => t[0] !== "text");
        let prompt;
        if (hasVars) {
          const inputRaw = await shared.get(ns, "input");
          const inputData = inputRaw ? serde.parse(inputRaw) : {};
          prompt = Mustache.render(tpl, inputData);
        } else {
          prompt = tpl;
        }
        if (!prompt.trim()) {
          core.setFailed("No prompt provided to team.");
          exit(1);
        }

        // Route API keys
        const gemKey = inputs.get("gemini-api-key");
        const antKey = inputs.get("anthropic-api-key");
        if (gemKey) Deno.env.set("GEMINI_API_KEY", gemKey);
        if (antKey) Deno.env.set("ANTHROPIC_API_KEY", antKey);

        // Load optional hooks
        const validatorPath = inputs.get("validator");
        const onRetryPath = inputs.get("on-retry");
        const validatorFn = validatorPath ? (await import(validatorPath)).default : null;
        const onRetryFn = onRetryPath ? (await import(onRetryPath)).default : null;

        // Load schema
        let schema = null;
        if (schemaPath) schema = JSON.parse(await Deno.readTextFile(schemaPath));

        // Run all agents in parallel
        async function invoke(cfg) {
          const debug = inputs.get("debug") === "true";
          const opts = { timeout, debug };
          if (cfg.model) opts.primary = cfg.model;
          if (cfg.fallback) opts.fallback = cfg.fallback;
          if (schema && cfg.agent === "claude") opts.schema = JSON.stringify(schema);
          const agent = cfg.agent === "claude" ? new Claude(opts) : new Gemini(opts);

          const cfgValidatorFn = cfg.validator ? (await import(cfg.validator)).default : validatorFn;
          const cfgOnRetryFn = cfg.onRetry ? (await import(cfg.onRetry)).default : onRetryFn;

          let parsed = null;
          let lastError = "";
          for (let attempt = 0; attempt <= maxRetries; attempt++) {
            const fullPrompt = attempt === 0
              ? prompt
              : prompt + "\n\nPrevious attempt failed validation:\n" + lastError + "\n\nPlease fix the output.";

            const r = await agent.run(new Blob([fullPrompt]).stream());
            const raw = new TextDecoder().decode(r.output);

            if (r.rc !== 0) {
              lastError = "Agent exited " + r.rc;
              if (attempt < maxRetries && cfgOnRetryFn) await cfgOnRetryFn(attempt + 1, lastError);
              continue;
            }

            const fmt = inputs.get("format") || undefined;
            if (fmt || schema) {
              try {
                parsed = serde.parse(raw, fmt);
              } catch (e) {
                lastError = "Output parse failed: " + (e instanceof Error ? e.message : String(e));
                if (attempt < maxRetries) {
                  if (cfgOnRetryFn) await cfgOnRetryFn(attempt + 1, lastError);
                  continue;
                }
                break;
              }
              if (typeof parsed !== "object" || parsed === null) parsed = { raw };

              if (cfgValidatorFn) {
                const vr = await cfgValidatorFn(raw, parsed);
                if (!vr.pass) {
                  lastError = vr.error || "Validator rejected output";
                  if (attempt >= maxRetries) break;
                  if (cfgOnRetryFn) await cfgOnRetryFn(attempt + 1, lastError);
                  continue;
                }
              }

              if (schema) {
                const v = validate(parsed, schema);
                if (!v.valid) {
                  lastError = v.errors;
                  if (attempt >= maxRetries) break;
                  if (cfgOnRetryFn) await cfgOnRetryFn(attempt + 1, lastError);
                  continue;
                }
              }
            } else {
              parsed = { raw };
            }
            break;
          }
          // Apply budget if configured
          const bqRaw = inputs.get("budget-queries");
          if (bqRaw && parsed) {
            const { apply, cap } = await import("https://raw.githubusercontent.com/sw2m/ci-agents/main/lib/budget.ts?t=" + Date.now());
            const bq = JSON.parse(bqRaw);
            const overflowPath = inputs.get("budget-overflow");
            if (!overflowPath) { throw new Error("budget-queries set but budget-overflow not provided"); }
            const handlers = (await import(overflowPath)).default;
            const budgetInput = inputs.get("budget");
            const budgetCap = budgetInput ? parseInt(budgetInput, 10) : cap(parseInt(inputs.get("round") || "1", 10));
            await apply(parsed, budgetCap, bq, serde.query, handlers);
          }

          return { agent: cfg.agent, model: cfg.model || "default", output: parsed };
        }
        const results = await Promise.all(agents.map(invoke));

        await shared.set(ns, "outputs", JSON.stringify(results));

        // Run evaluator
        const evaluator = await import(evaluatorPath);
        const alignment = await evaluator.default(results);
        const alignmentJson = JSON.stringify(alignment);
        await shared.set(ns, "alignment", alignmentJson);
        await output.set("alignment", alignmentJson);
