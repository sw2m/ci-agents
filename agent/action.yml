name: Agent
description: Run a single AI agent with prompt, schema validation, and retry logic.

inputs:
  namespace:
    description: Shared module namespace for input/output
    required: true
  prompt:
    description: Path to prompt template (.mustache/.md/.txt) or prompt text
    required: true
  schema:
    description: Path to JSON Schema file for output validation
    required: false
  format:
    description: "Output format hint for serde parsing (json, yaml, toml, or omit to sniff)"
    required: false
  model:
    description: Primary model name
    required: false
  fallback-model:
    description: Fallback model name (used when primary fails)
    required: false
  agent:
    description: Agent CLI to use (gemini or claude)
    required: false
    default: gemini
  api-key:
    description: API key for the agent (GEMINI_API_KEY or ANTHROPIC_API_KEY)
    required: true
  org:
    description: GitHub org for membership verification (skip if empty)
    required: false
  actor:
    description: Actor login to verify (defaults to github.actor)
    required: false
  retries:
    description: Max retries on structural failure
    required: false
    default: "3"
  timeout:
    description: Agent timeout in seconds
    required: false
    default: "900"

outputs:
  result:
    description: JSON string of parsed structured output
    value: ${{ steps.run.outputs.result }}

runs:
  using: composite
  steps:
    - uses: sw2m/octoscript/action@main

    - name: Verify org membership
      if: ${{ inputs.org != '' }}
      uses: sw2m/octoscript/org@main
      with:
        org: ${{ inputs.org }}
        actor: ${{ inputs.actor || github.actor }}


    - id: run
      shell: octoscript {0}
      env:
        INPUT_NAMESPACE: ${{ inputs.namespace }}
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_SCHEMA: ${{ inputs.schema }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_FALLBACK_MODEL: ${{ inputs.fallback-model }}
        INPUT_AGENT: ${{ inputs.agent }}
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_RETRIES: ${{ inputs.retries }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
        INPUT_VALIDATOR: ${{ inputs.validator }}
        INPUT_ON_RETRY: ${{ inputs.on-retry }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
      run: |
        const { Claude } = await import("https://raw.githubusercontent.com/sw2m/ci-agents/main/lib/claude.ts?t=" + Date.now());
        const { Gemini } = await import("https://raw.githubusercontent.com/sw2m/ci-agents/main/lib/gemini.ts?t=" + Date.now());
        const { validate } = await import("https://raw.githubusercontent.com/sw2m/ci-agents/main/lib/validate.ts?t=" + Date.now());

        const ns = inputs.get("namespace");
        const promptInput = inputs.get("prompt");
        const schemaPath = inputs.get("schema");
        const agentType = inputs.get("agent") || "gemini";
        const maxRetries = parseInt(inputs.get("retries") || "3", 10);
        const timeout = parseInt(inputs.get("timeout") || "900", 10);

        // Build prompt: read input from namespace, render template
        const inputRaw = await shared.get(ns, "input");
        const inputData = inputRaw ? serde.parse(inputRaw) : {};
        let prompt;
        if (promptInput && /\.(mustache|md|txt)$/.test(promptInput)) {
          const tpl = await Deno.readTextFile(promptInput);
          prompt = Mustache.render(tpl, inputData);
        } else {
          prompt = promptInput || "";
        }

        // Load schema if provided
        let schema = null;
        if (schemaPath) schema = JSON.parse(await Deno.readTextFile(schemaPath));

        // Route API key to the correct env var
        const apiKey = inputs.get("api-key");
        if (apiKey && agentType === "gemini") Deno.env.set("GEMINI_API_KEY", apiKey);
        if (apiKey && agentType === "claude") Deno.env.set("ANTHROPIC_API_KEY", apiKey);

        // Create agent with primary/fallback
        const opts = { timeout };
        if (inputs.get("model")) opts.primary = inputs.get("model");
        if (inputs.get("fallback-model")) opts.fallback = inputs.get("fallback-model");
        const extraArgs = inputs.get("extra-args");
        if (extraArgs) opts.extra = extraArgs.split(/\s+/).filter(Boolean);
        const agent = agentType === "claude" ? new Claude(opts) : new Gemini(opts);

        // Load optional hooks
        const validatorPath = inputs.get("validator");
        const onRetryPath = inputs.get("on-retry");
        const validatorFn = validatorPath ? (await import(validatorPath)).default : null;
        const onRetryFn = onRetryPath ? (await import(onRetryPath)).default : null;

        // Run with retry
        let lastError = "";
        for (let attempt = 0; attempt <= maxRetries; attempt++) {
          const fullPrompt = attempt === 0
            ? prompt
            : prompt + "\n\nPrevious attempt failed validation:\n" + lastError + "\n\nPlease fix the output.";

          const r = await agent.run(new Blob([fullPrompt]).stream());
          const raw = new TextDecoder().decode(r.output);
          await shared.set(ns, "raw", raw);

          if (r.rc !== 0) {
            const stderr = new TextDecoder().decode(r.err);
            lastError = "Agent exited " + r.rc + ": " + stderr;
            console.error("Agent failed (attempt " + (attempt + 1) + "): " + lastError);
            if (attempt >= maxRetries) {
              core.setFailed("Agent exhausted retries. Last error: " + lastError);
              exit(1);
            }
            if (onRetryFn) await onRetryFn(attempt + 1, lastError);
            continue;
          }

          const fmt = inputs.get("format") || undefined;
          if (fmt || schema) {
            const parsed = serde.parse(raw, fmt);
            const result = typeof parsed === "object" && parsed !== null ? parsed : { raw };

            if (validatorFn) {
              const vr = await validatorFn(raw, result);
              if (!vr.pass) {
                lastError = vr.error || "Validator rejected output";
                console.error("Validator failed (attempt " + (attempt + 1) + "): " + lastError);
                if (attempt >= maxRetries) {
                  core.setFailed("Validator exhausted retries. Last error: " + lastError);
                  exit(1);
                }
                if (onRetryFn) await onRetryFn(attempt + 1, lastError);
                continue;
              }
            }

            if (schema) {
              const v = validate(result, schema);
              if (!v.valid) {
                lastError = v.errors;
                console.error("Schema validation failed (attempt " + (attempt + 1) + "): " + lastError);
                if (attempt >= maxRetries) {
                  core.setFailed("Schema validation exhausted retries. Last error: " + lastError);
                  exit(1);
                }
                if (onRetryFn) await onRetryFn(attempt + 1, lastError);
                continue;
              }
            }

            await shared.set(ns, "result", JSON.stringify(result));
            await output.set("result", JSON.stringify(result));
          }
          break;
        }
